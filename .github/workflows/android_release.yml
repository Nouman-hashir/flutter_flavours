name: Android Release Debug

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Project files check
        run: |
          pwd
          ls -la
          ls -la android || true
          ls -la android/app || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK with full logs
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release -v 2>&1 | tee build-log.txt

      - name: Check APK output
        if: always()
        run: |
          echo "Flutter APK folder:"
          ls -lah build/app/outputs/flutter-apk/ || true

          echo "Android APK folder:"
          ls -lah build/app/outputs/apk/release/ || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build-log.txt
          if-no-files-found: warn

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error