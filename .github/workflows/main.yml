name: "Build & Release"

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    
    # Required to allow the release action to create a GitHub Release
    permissions:
      contents: write 
      
    steps:
      # Updated to v4 to avoid Node 16 deprecation warnings/errors
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Updated to 17 for modern Android Gradle compatibility
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed architecture: x64 so it natively uses macos-latest (Apple Silicon)

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Build iOS IPA
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          # Use mv instead of ln -s so the actual app bundle is zipped
          mv Runner.app Payload/
          zip -r app.ipa Payload

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*-release.apk,build/ios/iphoneos/app.ipa"
          tag: v1.0.${{ github.run_number }}
          # If you are using the default GitHub token, use secrets.GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}