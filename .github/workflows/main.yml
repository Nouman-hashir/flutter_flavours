name: "Build & Release"

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    
    # Required to allow the release action to create a GitHub Release
    permissions:
      contents: write 
      
    steps:
      # Updated to v4 to avoid Node 16 deprecation warnings/errors
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Updated to 17 for modern Android Gradle compatibility
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed architecture: x64 so it natively uses macos-latest (Apple Silicon)

      - name: Build Android APK (User Flavor)
        # We explicitly declare the flavor AND the target entry point
        run: flutter build apk --release --flavor user -t lib/main_user.dart --split-per-abi

      - name: Build iOS IPA (User Flavor)
        run: |
          flutter build ios --release --no-codesign --flavor user -t lib/main_user.dart
          cd build/ios/iphoneos
          mkdir Payload
          # Use a wildcard to move whatever .app folder was generated, instead of hardcoding Runner.app
          mv *.app Payload/
          zip -r app.ipa Payload

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          # Use the double-star wildcard (**) to search all subdirectories
          # because Gradle puts flavored APKs in folders like 'build/app/outputs/flutter-apk/user/release/'
          artifacts: "build/app/outputs/flutter-apk/**/*.apk,build/ios/iphoneos/app.ipa"
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}